<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SecuriBot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-900 text-white">
    <nav class="bg-gray-800 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-green-400">🔒 SecuriBot AI</h1>
            <div>
                <a href="/" class="px-4 py-2 text-gray-300 hover:text-white">Accueil</a>
                <a href="/audit/new" class="px-4 py-2 bg-green-600 rounded hover:bg-green-700">Nouvel Audit</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-8">
        <h2 class="text-3xl font-bold mb-8">📊 Dashboard</h2>

        <div class="grid md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg">
                <h3 class="text-gray-400">Audits Terminés</h3>
                <p class="text-4xl font-bold text-green-400">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg">
                <h3 class="text-gray-400">En Cours</h3>
                <p class="text-4xl font-bold text-yellow-400">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg">
                <h3 class="text-gray-400">Revenu Total</h3>
                <p class="text-4xl font-bold text-green-400">$0</p>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg">
            <h3 class="text-xl font-semibold mb-4">Audits Récents</h3>
            <p class="text-gray-400">Aucun audit pour le moment.</p>
        </div>
    </main>
</body>
</html>
